<!-- cameras.html — Camera management with role assignment + fullscreen view -->
<div style="height:100%;overflow-y:auto;background:var(--bg)">
<div style="padding:24px 28px 28px;min-height:100%;display:flex;flex-direction:column;box-sizing:border-box">

  <!-- ── Header ── -->
  <div style="margin-bottom:18px;flex-shrink:0">
    <div style="font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.3px">กล้อง</div>
    <div style="font-size:13px;color:var(--text-sub);margin-top:2px">แหล่งภาพที่เชื่อมต่อ — คลิกที่แถวเพื่อดูแบบเต็มจอ หรือกำหนดบทบาทการตรวจจับ</div>
  </div>

  <!-- ── Summary Cards ── -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:18px;flex-shrink:0">

    <!-- Add Camera -->
    <button onclick="ZENTRA.navigate('source')" style="background:transparent;border:1.5px dashed var(--border-mid);border-radius:12px;padding:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;cursor:pointer;font-family:var(--font);min-height:118px;transition:border-color .15s,background .15s"
      onmouseover="this.style.borderColor='var(--accent)';this.style.background='var(--accent-dim)'"
      onmouseout="this.style.borderColor='var(--border-mid)';this.style.background='transparent'">
      <span style="width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5v14"/></svg>
      </span>
      <div style="text-align:center">
        <div style="font-size:13.5px;font-weight:700;color:var(--text)">เพิ่มกล้อง</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px">เชื่อมต่อแหล่งภาพ</div>
      </div>
    </button>

    <!-- Online -->
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:18px 20px;display:flex;flex-direction:column;justify-content:space-between">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:13px;color:var(--text-sub)">ออนไลน์</span>
        <span style="width:26px;height:26px;border-radius:50%;background:var(--green-dim);color:var(--green);display:flex;align-items:center;justify-content:center">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        </span>
      </div>
      <div style="font-size:30px;font-weight:800;color:var(--text);margin-top:10px;font-variant-numeric:tabular-nums" id="cam-count-online">1</div>
    </div>

    <!-- Offline -->
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:18px 20px;display:flex;flex-direction:column;justify-content:space-between">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:13px;color:var(--text-sub)">ออฟไลน์</span>
        <span style="width:26px;height:26px;border-radius:50%;background:var(--red-dim);color:var(--red);display:flex;align-items:center;justify-content:center">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </span>
      </div>
      <div style="font-size:30px;font-weight:800;color:var(--text);margin-top:10px;font-variant-numeric:tabular-nums" id="cam-count-offline">0</div>
    </div>

    <!-- Active Roles -->
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:18px 20px;display:flex;flex-direction:column;justify-content:space-between">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:13px;color:var(--text-sub)">บทบาทที่เปิดใช้</span>
        <span style="width:26px;height:26px;border-radius:50%;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 12H3v9h8z"/><path d="M21 3h-8v18h8z"/><path d="M21 3h-8v6h8z"/></svg>
        </span>
      </div>
      <div style="font-size:30px;font-weight:800;color:var(--text);margin-top:10px;font-variant-numeric:tabular-nums" id="cam-active-roles">0</div>
    </div>
  </div>

  <!-- ── Camera Table ── -->
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;flex:1">

    <!-- Table header bar -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)">
      <span style="font-size:15px;font-weight:700;color:var(--text)">กล้องทั้งหมด</span>
    </div>

    <!-- Column headers -->
    <div style="display:grid;grid-template-columns:64px 1fr 1fr 1.8fr 80px 80px;gap:12px;padding:11px 20px;background:var(--bg-card-alt);border-bottom:1px solid var(--border)">
      <span style="font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.5px">ภาพ</span>
      <span style="font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.5px">ชื่อ</span>
      <span style="font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.5px">สถานะ</span>
      <span style="font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.5px">บทบาท</span>
      <span style="font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;text-align:center">ทดสอบ</span>
      <span style="font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;text-align:center">ตั้งค่า</span>
    </div>

    <!-- Camera rows -->
    <div id="cam-table-body"></div>

    <!-- Pagination bar -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:13px 20px;border-top:1px solid var(--border)">
      <span style="font-size:12.5px;color:var(--text-muted)" id="cam-table-count">แสดง 1 กล้อง</span>
    </div>
  </div>

</div>
</div>

<!-- ══════════════════════════════════════════════
     FULLSCREEN VIEW MODAL
══════════════════════════════════════════════ -->
<div id="cam-fs-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;flex-direction:column">
  <!-- Topbar -->
  <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);flex-shrink:0">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="display:flex;align-items:center;gap:6px;background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.4);padding:4px 10px;border-radius:7px;color:#ef4444;font-size:11.5px;font-weight:700">
        <span style="width:7px;height:7px;border-radius:50%;background:#ef4444;animation:recPulse 1.4s infinite"></span>LIVE
      </span>
      <span id="fs-cam-label" style="color:#fff;font-weight:600;font-size:14px">กล้อง #1</span>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <button onclick="camOpenRoleModal(0)" style="display:flex;align-items:center;gap:7px;height:34px;padding:0 14px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>
        ตั้งค่าบทบาท
      </button>
      <button onclick="camCloseFs()" style="width:34px;height:34px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>
  <!-- Video area -->
  <div style="flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#000">
    <img id="fs-frame" src="" style="max-width:100%;max-height:100%;object-fit:contain" alt="">
    <div id="fs-placeholder" style="display:flex;flex-direction:column;align-items:center;gap:12px;color:rgba(255,255,255,.3)">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2"/></svg>
      <span style="font-size:14px">ไม่มีสัญญาณ</span>
    </div>
  </div>
  <!-- Bottom info bar -->
  <div style="display:flex;align-items:center;justify-content:space-between;padding:11px 20px;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);flex-shrink:0">
    <div style="display:flex;gap:8px;flex-wrap:wrap" id="fs-roles-bar"></div>
    <span style="font-size:12px;color:rgba(255,255,255,.5)" id="fs-clock">--:--:--</span>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     ROLE ASSIGNMENT MODAL
══════════════════════════════════════════════ -->
<div id="cam-role-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:center;justify-content:center">
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:16px;box-shadow:0 24px 60px rgba(0,0,0,.5);width:440px;max-height:90vh;overflow-y:auto;padding:28px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div>
        <div style="font-size:17px;font-weight:800;color:var(--text)">ตั้งค่าบทบาทการตรวจจับ</div>
        <div style="font-size:12.5px;color:var(--text-muted);margin-top:2px" id="role-modal-cam-name">กล้อง #1</div>
      </div>
      <button onclick="camCloseRoleModal()" style="width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:18px;line-height:1">×</button>
    </div>

    <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px;background:var(--bg-card-alt);border-radius:9px;padding:10px 14px">
      เลือกโมเดลตรวจจับที่ต้องการเปิดใช้สำหรับกล้องนี้
    </div>

    <!-- Role checkboxes -->
    <div id="role-checklist" style="display:flex;flex-direction:column;gap:10px;margin-bottom:18px"></div>

    <!-- Which PPE items to enforce for this camera (applies when PPE role is on) -->
    <div id="role-ppe-section" style="margin-bottom:20px"></div>

    <!-- Safety zones for this camera (only shown when Zone role is on) -->
    <div id="role-zone-section" style="margin-bottom:20px"></div>

    <!-- Actions -->
    <div style="display:flex;gap:9px;justify-content:flex-end">
      <button onclick="camCloseRoleModal()" style="height:36px;padding:0 16px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--text-sub);font-family:var(--font);font-size:13px;cursor:pointer">ยกเลิก</button>
      <button onclick="camSaveRoles()" style="height:36px;padding:0 20px;border-radius:9px;border:none;background:var(--accent);color:#fff;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer">บันทึกบทบาท</button>
    </div>
  </div>
</div>

<script>
var _camList = [];
var _camRoles = {};        // { camId: [roleIds] }
var _camPpeItems = {};     // { camId: [ppe category ids] }
var _fsCamIdx = 0;

// PPE categories the model can enforce (must match ppe_association CATEGORIES).
var _ppeItemsCfg = [
  { id: 'helmet',  label: 'หมวกนิรภัย',     icon: '⛑️' },
  { id: 'glasses', label: 'แว่นตานิรภัย',    icon: '🥽' },
  { id: 'vest',    label: 'เสื้อกั๊ก',       icon: '🦺' },
  { id: 'gloves',  label: 'ถุงมือ',          icon: '🧤' },
  { id: 'boots',   label: 'รองเท้าเซฟตี้',   icon: '🥾' },
];
var _fsTimer  = null;
var _roleCamIdx = 0;

var _rolesCfg = [
  { id: 'ppe',    label: 'ตรวจจับ PPE',          desc: 'ตรวจหมวกนิรภัย แว่นตานิรภัย เสื้อกั๊ก ถุงมือ รองเท้าเซฟตี้', color: 'var(--orange)', icon: '🦺', status: 'active' },
  { id: 'zone',   label: 'เฝ้าพื้นที่อันตราย',    desc: 'ตรวจบุคคลเข้าพื้นที่อันตราย',         color: 'var(--accent)', icon: '📍', status: 'active' },
  { id: 'fall',   label: 'ตรวจจับการล้ม',        desc: 'ตรวจการล้มและแจ้งเตือนฉุกเฉิน', color: 'var(--red)', icon: '🚨', status: 'active' },
];

function camRoleBadge(roleId) {
  var r = _rolesCfg.find(function(x) { return x.id === roleId; });
  if (!r) return '';
  return '<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;background:' + r.color + '22;color:' + r.color + ';font-size:11px;font-weight:700;white-space:nowrap">'
    + r.icon + ' ' + r.label + '</span>';
}

function camActiveRoleCount() {
  var n = 0;
  Object.keys(_camRoles).forEach(function(k) { n += (_camRoles[k] || []).length; });
  return n;
}

function camRenderTable() {
  var body = document.getElementById('cam-table-body');
  if (!body) return;
  var cam = ZENTRA.state.camera;
  var connected = (cam === 'connected');

  body.innerHTML = _camList.map(function(c, i) {
    var roles = _camRoles[c.id] || [];
    var badgesHtml = roles.length > 0
      ? roles.map(camRoleBadge).join(' ')
      : '<span style="font-size:12px;color:var(--text-muted);font-style:italic">ยังไม่กำหนดบทบาท</span>';
    return '<div style="display:grid;grid-template-columns:64px 1fr 1fr 1.8fr 80px 80px;gap:12px;padding:14px 20px;align-items:center;border-bottom:1px solid var(--border)">'
      + '<div style="width:60px;height:40px;border-radius:7px;background:var(--bg-video);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.3)">'
      + (ZENTRA._lastFrame && connected
        ? '<img src="' + ZENTRA._lastFrame + '" style="width:100%;height:100%;object-fit:cover" alt="">'
        : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2"/></svg>')
      + '</div>'
      + '<div>'
      + '<div style="font-size:13.5px;font-weight:600;color:var(--text)">' + ZENTRA.esc(c.name) + '</div>'
      + '<div style="font-size:11px;color:var(--text-muted);font-family:ui-monospace,monospace;margin-top:2px">' + ZENTRA.esc(c.source || '—') + '</div>'
      + '</div>'
      + (connected
        ? '<span style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;background:var(--green-dim);color:var(--green);font-size:11.5px;font-weight:700"><span style="width:6px;height:6px;border-radius:50%;background:var(--green)"></span>ออนไลน์</span>'
        : '<span style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;background:var(--red-dim);color:var(--red);font-size:11.5px;font-weight:700"><span style="width:6px;height:6px;border-radius:50%;background:var(--red)"></span>ออฟไลน์</span>')
      + '<div style="display:flex;flex-wrap:wrap;gap:5px">' + badgesHtml + '</div>'
      + '<div style="text-align:center"><button onclick="camOpenFs(' + i + ')" style="width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;display:inline-flex;align-items:center;justify-content:center" title="Fullscreen view"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg></button></div>'
      + '<div style="text-align:center"><button onclick="camOpenRoleModal(' + i + ')" style="width:34px;height:34px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center" title="Set roles"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg></button></div>'
      + '</div>';
  }).join('');

  var cnt = document.getElementById('cam-table-count');
  if (cnt) cnt.textContent = 'แสดง ' + _camList.length + ' กล้อง';
  var arc = document.getElementById('cam-active-roles');
  if (arc) arc.textContent = camActiveRoleCount();
}

// ─── Fullscreen ───────────────────────────────────
function camOpenFs(idx) {
  _fsCamIdx = idx;
  var modal = document.getElementById('cam-fs-modal');
  if (!modal) return;
  modal.style.display = 'flex';

  var c = _camList[idx] || { name: 'กล้อง #1' };
  var lbl = document.getElementById('fs-cam-label');
  if (lbl) lbl.textContent = c.name;

  // Show last frame
  var img = document.getElementById('fs-frame');
  var ph  = document.getElementById('fs-placeholder');
  if (ZENTRA._lastFrame) {
    if (img) { img.src = ZENTRA._lastFrame; img.style.display = 'block'; }
    if (ph)  ph.style.display = 'none';
  } else {
    if (img) img.style.display = 'none';
    if (ph)  ph.style.display = 'flex';
  }

  // Roles bar
  var roles = _camRoles[(c.id || 'cam0')] || [];
  var rb = document.getElementById('fs-roles-bar');
  if (rb) rb.innerHTML = roles.length > 0
    ? roles.map(camRoleBadge).join(' ')
    : '<span style="font-size:12px;color:rgba(255,255,255,.4)">ยังไม่กำหนดบทบาท — กด "ตั้งค่าบทบาท" เพื่อกำหนด</span>';

  // Live frame updates
  clearInterval(_fsTimer);
  _fsTimer = setInterval(function() {
    if (!document.getElementById('cam-fs-modal')) { clearInterval(_fsTimer); return; }
    if (ZENTRA._lastFrame) {
      if (img) { img.src = ZENTRA._lastFrame; img.style.display = 'block'; }
      if (ph)  ph.style.display = 'none';
    }
    var clk = document.getElementById('fs-clock');
    if (clk) clk.textContent = new Date().toLocaleTimeString('th-TH', { hour12: false });
  }, 200);

  // Prevent body scroll
  document.body.style.overflow = 'hidden';
}

function camCloseFs() {
  clearInterval(_fsTimer);
  var modal = document.getElementById('cam-fs-modal');
  if (modal) modal.style.display = 'none';
  document.body.style.overflow = '';
}

// ─── Role modal ───────────────────────────────────
function camOpenRoleModal(idx) {
  _roleCamIdx = idx;
  var c = _camList[idx] || { id: 'cam0', name: 'กล้อง #1' };
  var modal = document.getElementById('cam-role-modal');
  if (!modal) return;
  modal.style.display = 'flex';

  var nm = document.getElementById('role-modal-cam-name');
  if (nm) nm.textContent = c.name;

  var current = _camRoles[c.id] || [];
  var cl = document.getElementById('role-checklist');
  if (!cl) return;
  cl.innerHTML = _rolesCfg.map(function(r) {
    var checked = current.indexOf(r.id) !== -1;
    return '<label style="display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:10px;background:var(--bg-card-alt);border:1px solid var(--border);cursor:pointer;transition:border-color .15s;outline:none" '
      + 'onmouseover="this.style.borderColor=\'var(--border-accent)\'" onmouseout="this.style.borderColor=\'var(--border)\'">'
      + '<input type="checkbox" id="role-chk-' + r.id + '" ' + (checked ? 'checked' : '') + ' style="width:16px;height:16px;cursor:pointer;margin-top:2px;accent-color:var(--accent)">'
      + '<div style="flex:1">'
      + '<div style="display:flex;align-items:center;gap:7px">'
      + '<span style="font-size:17px">' + r.icon + '</span>'
      + '<span style="font-size:13.5px;font-weight:700;color:var(--text)">' + r.label + '</span>'
      + (r.status === 'planned' ? '<span style="padding:2px 7px;border-radius:99px;background:var(--bg-video);color:var(--text-muted);font-size:10px;font-weight:600">เร็วๆ นี้</span>' : '')
      + '</div>'
      + '<div style="font-size:12px;color:var(--text-muted);margin-top:3px">' + r.desc + '</div>'
      + '</div>'
      + '</label>';
  }).join('');

  camRenderPpeSection(c.id);
  camRenderZoneSection(c.id);
}

// Which PPE items this camera enforces. A checked item = "if a worker is NOT
// wearing it, raise a violation" (uses the model's reliable worn-detection, so it
// works for glasses/gloves too — no explicit no_* box needed).
function camRenderPpeSection(camId) {
  var box = document.getElementById('role-ppe-section');
  if (!box) return;
  var sel = _camPpeItems[camId] || ['helmet', 'vest'];
  var head = '<div style="font-size:12px;font-weight:800;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px">ตรวจเช็ค PPE อะไรบ้าง</div>'
    + '<div style="font-size:11.5px;color:var(--text-muted);margin-bottom:10px">เลือกอุปกรณ์ที่กล้องนี้จะตรวจจับ</div>';
  var grid = _ppeItemsCfg.map(function(it) {
    var checked = sel.indexOf(it.id) !== -1;
    return '<label style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;background:var(--bg-card-alt);border:1px solid var(--border);cursor:pointer">'
      + '<input type="checkbox" id="ppe-item-' + it.id + '" ' + (checked ? 'checked' : '') + ' style="width:15px;height:15px;cursor:pointer;accent-color:var(--accent)">'
      + '<span style="font-size:16px">' + it.icon + '</span>'
      + '<span style="font-size:13px;color:var(--text)">' + it.label + '</span>'
      + '</label>';
  }).join('');
  box.innerHTML = head + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">' + grid + '</div>';
}

// Show the camera's safety zones inside the roles modal (edit / draw new → editor)
function camRenderZoneSection(camId) {
  var box = document.getElementById('role-zone-section');
  if (!box) return;
  box.innerHTML = '';
  fetch('/api/zones').then(function(r) { return r.json(); }).then(function(zones) {
    var mine = (zones || []).filter(function(z) { return (z.camera_id || 'cam0') === camId; });
    var head = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
      + '<span style="font-size:12px;font-weight:800;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase">พื้นที่อันตราย</span>'
      + '<button onclick="camDrawNewZone(\'' + camId + '\')" style="font-size:12px;color:var(--accent);background:transparent;border:none;cursor:pointer;font-family:var(--font);font-weight:600">＋ วาดโซนใหม่</button>'
      + '</div>';
    var list;
    if (mine.length === 0) {
      list = '<div style="font-size:12px;color:var(--text-muted);font-style:italic;padding:4px 0">ยังไม่ได้กำหนดพื้นที่สำหรับกล้องนี้</div>';
    } else {
      list = mine.map(function(z) {
        var col = '#ef4444';
        return '<div onclick="camEditZone(\'' + camId + '\',' + z.id + ')" style="display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;background:var(--bg-card-alt);border:1px solid var(--border);cursor:pointer;margin-bottom:6px" title="แก้ไขโซนนี้">'
          + '<span style="width:9px;height:9px;border-radius:2px;background:' + col + ';flex-shrink:0"></span>'
          + '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + ZENTRA.esc(z.name || 'Zone') + '</div>'
          + '<div style="font-size:10.5px;color:var(--text-muted)">อันตราย · ' + (z.points || []).length + ' จุด</div></div>'
          + '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg>'
          + '</div>';
      }).join('');
    }
    box.innerHTML = head + list;
  }).catch(function() {});
}

// Hand off to the Zone Editor with a camera (+ optional zone) pre-selected.
function camEditZone(camId, zoneId) {
  ZENTRA._pendingZoneEdit = { camId: camId, zoneId: zoneId };
  ZENTRA.navigate('zone_editor');
}
function camDrawNewZone(camId) {
  ZENTRA._pendingZoneEdit = { camId: camId, zoneId: null };
  ZENTRA.navigate('zone_editor');
}

function camCloseRoleModal() {
  var modal = document.getElementById('cam-role-modal');
  if (modal) modal.style.display = 'none';
}

function camSaveRoles() {
  var c = _camList[_roleCamIdx] || { id: 'cam0' };
  var selected = _rolesCfg.filter(function(r) {
    var chk = document.getElementById('role-chk-' + r.id);
    return chk && chk.checked;
  }).map(function(r) { return r.id; });
  _camRoles[c.id] = selected;

  var ppeItems = _ppeItemsCfg.filter(function(it) {
    var chk = document.getElementById('ppe-item-' + it.id);
    return chk && chk.checked;
  }).map(function(it) { return it.id; });
  _camPpeItems[c.id] = ppeItems;

  // Persist to settings (merge — preserve any other fields on this camera)
  fetch('/api/settings').then(function(res) { return res.json(); }).then(function(settings) {
    if (!settings.cameras) settings.cameras = {};
    var prev = settings.cameras[c.id] || {};
    prev.roles = selected;
    prev.ppe_items = ppeItems;
    settings.cameras[c.id] = prev;
    return fetch('/api/settings', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(settings) });
  }).catch(function() {}).then(function() {
    camCloseRoleModal();
    camRenderTable();
    // Update FS roles bar if open
    var rb = document.getElementById('fs-roles-bar');
    if (rb) rb.innerHTML = selected.length > 0
      ? selected.map(camRoleBadge).join(' ')
      : '<span style="font-size:12px;color:rgba(255,255,255,.4)">ยังไม่กำหนดบทบาท</span>';
  });
}

// ─── Init ─────────────────────────────────────────
function init_cameras() {
  _camList = [{ id: 'cam0', name: 'กล้อง #1', source: (ZENTRA.state.pipeline && ZENTRA.state.pipeline.source) || '—' }];

  // Load saved roles from settings
  fetch('/api/settings').then(function(r) { return r.json(); }).then(function(s) {
    var cams = (s.cameras || {});
    Object.keys(cams).forEach(function(id) {
      _camRoles[id] = cams[id].roles || [];
      _camPpeItems[id] = cams[id].ppe_items || ['helmet', 'vest'];
    });
    if (!_camRoles['cam0']) _camRoles['cam0'] = [];
    if (!_camPpeItems['cam0']) _camPpeItems['cam0'] = ['helmet', 'vest'];
    camRenderTable();
  }).catch(function() {
    if (!_camRoles['cam0']) _camRoles['cam0'] = [];
    camRenderTable();
  });

  // Camera status cards
  var cam = ZENTRA.state.camera;
  var onEl  = document.getElementById('cam-count-online');
  var offEl = document.getElementById('cam-count-offline');
  if (cam === 'connected') { if (onEl) onEl.textContent = '1'; if (offEl) offEl.textContent = '0'; }
  else { if (onEl) onEl.textContent = '0'; if (offEl) offEl.textContent = '1'; }
}
</script>
